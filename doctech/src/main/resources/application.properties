# OIDC Configuration (Keycloak)
quarkus.oidc.auth-server-url=http://localhost:8180/realms/college
quarkus.oidc.client-id=doctech-app
quarkus.oidc.credentials.secret=change-me
quarkus.oidc.application-type=web-app

# Logout
quarkus.oidc.logout.path=/logout

# Security Policy
# Static files and root are public
quarkus.http.auth.permission.static.paths=/v1/*, /ui
quarkus.http.auth.permission.static.policy=permit

# API endpoints and UI crawl form require authentication (roles enforced in code)
quarkus.http.auth.permission.api.paths=/api/*, /ui/crawl
quarkus.http.auth.permission.api.policy=authenticated

# default
quarkus.container-image.build=false
quarkus.http.root-path=/docs

docs.root.path=${DocTechHome:/tmp}

# JVM image builds
%jib.quarkus.container-image.build=true
%jib.quarkus.jib.docker-executable-name=podman
%jib.quarkus.container-image.builder=jib

# Native/custom builds
%podman.quarkus.container-image.build=true
%podman.quarkus.container-image.builder=podman
